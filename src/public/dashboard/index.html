<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Widget Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body { font-family: 'Inter', sans-serif; }

    .dropdown-menu {
      display: none;
      position: absolute;
      top: 55px;
      right: 0;
      background: white;
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.12);
      border: 1px solid var(--border);
      padding: 8px;
      min-width: 170px;
      z-index: 20;
      overflow: hidden;
    }

    .dropdown-menu.open { display: block; }

    .dropdown-item {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
      text-align: left;
      padding: 10px 12px;
      border: none;
      background: transparent;
      border-radius: 10px;
      font-size: 13.5px;
      font-weight: 600;
      color: #dc2626;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: background 0.15s ease;
    }

    .dropdown-item:hover { background: #fef2f2; }
    .dropdown-item svg { width: 16px; height: 16px; }
  </style>
</head>
<body>

  <div class="dashboard-shell">

    <aside class="sidebar">
      <div class="auth-logo">
        <div class="auth-logo-icon">W</div>
        <div class="auth-logo-text">Widget Platform</div>
      </div>

      <nav class="sidebar-nav">
        <a href="index.html" class="active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg>
          Dashboard
        </a>
      </nav>

      <div class="sidebar-footer">
        <button class="logout-btn" id="logoutBtnSidebar">Log out</button>
      </div>
    </aside>

    <main class="main-content">

      <div class="topbar">
        <input type="text" class="topbar-search" id="searchInput" placeholder="🔍  Search widgets...">

        <div class="topbar-right" style="position: relative;">
          <div class="topbar-user" style="cursor: pointer;" id="accountToggle">
            <div class="name" id="userName">Account</div>
            <div class="email" id="userEmail">Owner</div>
          </div>
          <div class="topbar-avatar" id="userAvatar" style="cursor: pointer;">A</div>

          <div id="accountDropdown" class="dropdown-menu">
            <button id="logoutBtnDropdown" class="dropdown-item">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
              Log out
            </button>
          </div>
        </div>
      </div>

      <div class="page-header">
        <h1>Dashboard</h1>
        <p>An overview of your widgets and submissions.</p>
      </div>

      <div class="stats-grid" id="statsGrid">
        <div class="loading">Loading stats...</div>
      </div>

      <div class="content-grid">

        <!-- Left: profile card -->
        <div class="profile-card">
          <div style="position: relative; display: inline-block;">
            <div class="profile-avatar-lg" id="profileAvatar" style="cursor: pointer;">A</div>
            <div id="profileDropdown" class="dropdown-menu" style="top: 66px; left: 50%; transform: translateX(-50%); right: auto;">
              <button id="logoutBtnProfile" class="dropdown-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                Log out
              </button>
            </div>
          </div>
          <h3 id="profileName">Account</h3>
          <p>Widget Owner</p>
          <div class="profile-stats">
            <div><div class="num" id="pStatWidgets">-</div><div class="lbl">Widgets</div></div>
            <div><div class="num" id="pStatSubs">-</div><div class="lbl">Submissions</div></div>
          </div>
        </div>

        <!-- Right: widgets + recent -->
        <div>
          <div class="card-block">
            <div class="card-block-header"><h3>Your Widgets</h3></div>
            <div class="widgets-grid" id="widgetsGrid">
              <div class="loading">Loading widgets...</div>
            </div>
          </div>

          <div class="card-block">
            <div class="card-block-header">
              <h3>📨 Recent Submissions</h3>
            </div>
            <div id="recentList">
              <div class="loading">Loading...</div>
            </div>
          </div>
        </div>

      </div>
    </main>

  </div>

  <script>
    const API_BASE = 'http://localhost:3000';
    const token = localStorage.getItem('token');
    if (!token) window.location.href = 'login.html';

    function doLogout() {
      localStorage.removeItem('token');
      window.location.href = 'login.html';
    }

    document.getElementById('logoutBtnSidebar').addEventListener('click', doLogout);
    document.getElementById('logoutBtnDropdown').addEventListener('click', doLogout);
    document.getElementById('logoutBtnProfile').addEventListener('click', doLogout);

    // Account dropdown toggle (topbar avatar)
    const accountToggle = document.getElementById('accountToggle');
    const userAvatar = document.getElementById('userAvatar');
    const accountDropdown = document.getElementById('accountDropdown');

    function toggleDropdown() {
      accountDropdown.classList.toggle('open');
    }
    accountToggle.addEventListener('click', toggleDropdown);
    userAvatar.addEventListener('click', toggleDropdown);

    // Profile card avatar — its own small logout dropdown
    const profileAvatar = document.getElementById('profileAvatar');
    const profileDropdown = document.getElementById('profileDropdown');
    profileAvatar.addEventListener('click', function () {
      profileDropdown.classList.toggle('open');
    });

    document.addEventListener('click', function (e) {
      if (!e.target.closest('.topbar-right')) {
        accountDropdown.classList.remove('open');
      }
      if (!e.target.closest('.profile-card')) {
        profileDropdown.classList.remove('open');
      }
    });

    // Live search — widgets ko title se filter karo
    document.getElementById('searchInput').addEventListener('input', function (e) {
      const query = e.target.value.toLowerCase();
      const cards = document.querySelectorAll('#widgetsGrid .widget-card');
      cards.forEach(card => {
        const title = card.querySelector('.widget-card-title').textContent.toLowerCase();
        card.style.display = title.includes(query) ? '' : 'none';
      });
    });

    async function apiGet(path) {
      const res = await fetch(`${API_BASE}${path}`, { headers: { 'Authorization': `Bearer ${token}` } });
      if (res.status === 401 || res.status === 403) {
        localStorage.removeItem('token');
        window.location.href = 'login.html';
        return null;
      }
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || 'Something went wrong');
      return data;
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str == null ? '' : String(str);
      return div.innerHTML;
    }

    function timeAgo(dateStr) {
      const diffMs = Date.now() - new Date(dateStr).getTime();
      const mins = Math.floor(diffMs / 60000);
      if (mins < 1) return 'just now';
      if (mins < 60) return `${mins}m ago`;
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return `${hrs}h ago`;
      return `${Math.floor(hrs / 24)}d ago`;
    }

    function renderStats(stats) {
      document.getElementById('statsGrid').innerHTML = `
        <div class="stat-card c1" id="statCardTotalWidgets" style="cursor:pointer;">
          <div class="stat-icon-wrap">📦</div>
          <div><div class="stat-label">Total Widgets</div><div class="stat-value">${stats.totalWidgets}</div></div>
        </div>
        <div class="stat-card c2" id="statCardTotalSubs" style="cursor:pointer;">
          <div class="stat-icon-wrap">📩</div>
          <div><div class="stat-label">Total Submissions</div><div class="stat-value">${stats.totalSubmissions}</div></div>
        </div>
        <div class="stat-card c3" id="statCardThisWeek" style="cursor:pointer;">
          <div class="stat-icon-wrap">📈</div>
          <div><div class="stat-label">This Week</div><div class="stat-value">${stats.submissionsThisWeek}</div></div>
        </div>
        <div class="stat-card c4" id="statCardActiveWidgets" style="cursor:pointer;">
          <div class="stat-icon-wrap">✅</div>
          <div><div class="stat-label">Active Widgets</div><div class="stat-value">${stats.activeWidgets}</div></div>
        </div>
      `;
      attachStatCardHandlers();
      document.getElementById('pStatWidgets').textContent = stats.totalWidgets;
      document.getElementById('pStatSubs').textContent = stats.totalSubmissions;
    }

    let lastLoadedWidgets = [];

    function applyWidgetFilter(filter) {
      const grid = document.getElementById('widgetsGrid');
      const cards = grid.querySelectorAll('.widget-card');
      cards.forEach((card, i) => {
        const w = lastLoadedWidgets[i];
        const show = filter === 'active' ? Boolean(w && w.is_active) : true;
        card.style.display = show ? '' : 'none';
      });
    }

    function attachStatCardHandlers() {
      const totalWidgetsCard = document.getElementById('statCardTotalWidgets');
      const activeWidgetsCard = document.getElementById('statCardActiveWidgets');
      const totalSubsCard = document.getElementById('statCardTotalSubs');
      const thisWeekCard = document.getElementById('statCardThisWeek');
      const scrollToRecent = () => {
        const el = document.getElementById('recentList');
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      };
      if (totalWidgetsCard) totalWidgetsCard.addEventListener('click', () => applyWidgetFilter('all'));
      if (activeWidgetsCard) activeWidgetsCard.addEventListener('click', () => applyWidgetFilter('active'));
      if (totalSubsCard) totalSubsCard.addEventListener('click', scrollToRecent);
      if (thisWeekCard) thisWeekCard.addEventListener('click', scrollToRecent);
    }

    function renderWidgets(widgets) {
      lastLoadedWidgets = widgets;
      const grid = document.getElementById('widgetsGrid');
      if (!widgets.length) {
        grid.innerHTML = `<div class="empty-state">No widgets yet.</div>`;
        return widgets;
      }
      grid.innerHTML = widgets.map(w => `
        <a href="widget-detail.html?id=${w.id}" class="widget-card">
          <div class="widget-card-icon">💬</div>
          <div class="widget-card-type">${w.type || 'widget'}</div>
          <div class="widget-card-title">${escapeHtml(w.title)}</div>
          <div class="widget-card-meta">
            <span><span class="status-dot ${w.is_active ? 'active' : 'inactive'}"></span>${w.is_active ? 'Active' : 'Inactive'}</span>
            <span>View →</span>
          </div>
        </a>
      `).join('');
      return widgets;
    }

    async function loadRecentSubmissions(widgets) {
      const listEl = document.getElementById('recentList');
      if (!widgets.length) {
        listEl.innerHTML = `<div class="empty-state">No submissions yet.</div>`;
        return;
      }
      try {
        const data = await apiGet(`/widgets/${widgets[0].id}/submissions`);
        const submissions = (data?.submissions || []).slice(0, 5);
        if (!submissions.length) {
          listEl.innerHTML = `<div class="empty-state">No submissions yet.</div>`;
          return;
        }
        listEl.innerHTML = submissions.map(sub => {
          const email = sub.data?.email || 'Unknown';
          return `
            <div class="mini-row">
              <div class="mini-left">
                <div class="mini-avatar">${email.charAt(0).toUpperCase()}</div>
                <span class="mini-email">${escapeHtml(email)}</span>
              </div>
              <div class="mini-time">🕒 ${timeAgo(sub.created_at)}</div>
            </div>
          `;
        }).join('');
      } catch (err) {
        listEl.innerHTML = `<div class="empty-state">Couldn't load.</div>`;
      }
    }

    async function loadDashboard() {
      try {
        const statsData = await apiGet('/owners/me/stats');
        if (statsData) renderStats(statsData.stats);

        const widgetsData = await apiGet('/widgets');
        if (widgetsData) {
          const widgets = renderWidgets(widgetsData.widgets);
          loadRecentSubmissions(widgets);
        }
      } catch (err) {
        console.error(err);
        document.getElementById('statsGrid').innerHTML = `<div class="empty-state">Failed to load stats.</div>`;
        document.getElementById('widgetsGrid').innerHTML = `<div class="empty-state">Failed to load widgets.</div>`;
      }
    }

    loadDashboard();
  </script>

</body>
</html>
