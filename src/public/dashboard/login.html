<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Widget Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Poppins', sans-serif;
      background: #e0e5ec;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px;
    }

    .neu-card {
      width: 100%;
      max-width: 360px;
      background: #e0e5ec;
      border-radius: 30px;
      padding: 40px 32px;
      box-shadow: 8px 8px 20px #b8bec7, -8px -8px 20px #ffffff;
      text-align: center;
    }

    .neu-logo {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px auto;
      box-shadow: 6px 6px 14px #b8bec7, -6px -6px 14px #ffffff;
      color: white;
      font-size: 34px;
      font-weight: 700;
    }

    .neu-card h1 {
      font-size: 20px;
      font-weight: 700;
      color: #2d2d3a;
    }

    .neu-card .subtitle {
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #8f95a3;
      margin-top: 4px;
      margin-bottom: 34px;
    }

    .neu-input-group {
      position: relative;
      margin-bottom: 22px;
    }

    .neu-input-group svg {
      position: absolute;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      color: #8f95a3;
    }

    .neu-input-group input {
      width: 100%;
      padding: 16px 20px 16px 48px;
      border: none;
      border-radius: 50px;
      background: #e0e5ec;
      box-shadow: inset 4px 4px 8px #b8bec7, inset -4px -4px 8px #ffffff;
      font-size: 14px;
      color: #2d2d3a;
      font-family: 'Poppins', sans-serif;
    }

    .neu-input-group input::placeholder { color: #a3a9b7; }
    .neu-input-group input:focus { outline: none; }

    .neu-btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 50px;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: white;
      font-size: 15px;
      font-weight: 600;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
      box-shadow: 6px 6px 14px #b8bec7, -6px -6px 14px #ffffff;
      transition: opacity 0.15s ease;
      margin-top: 6px;
    }

    .neu-btn:hover { opacity: 0.92; }
    .neu-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .neu-links {
      margin-top: 20px;
      font-size: 12px;
      color: #8f95a3;
    }

    .neu-links span { font-weight: 600; color: #4f46e5; cursor: default; }

    .neu-error {
      background: #fdecec;
      color: #dc2626;
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 12.5px;
      margin-bottom: 18px;
      display: none;
    }
    .neu-error.visible { display: block; }
  </style>
</head>
<body>

  <div class="neu-card">
    <div class="neu-logo">W</div>
    <h1>Widget Platform</h1>
    <div class="subtitle">Sign in to continue</div>

    <div class="neu-error" id="errorMsg"></div>

    <form id="loginForm">
      <div class="neu-input-group">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <input type="email" id="email" placeholder="Email address" required autocomplete="email">
      </div>

      <div class="neu-input-group">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input type="password" id="password" placeholder="Password" required autocomplete="current-password">
      </div>

      <button type="submit" class="neu-btn" id="loginBtn">Login</button>
    </form>

    <div class="neu-links">Forgot password? <span>or Sign Up</span></div>
  </div>

  <script>
    const API_BASE = 'http://localhost:3000';
    const form = document.getElementById('loginForm');
    const errorMsg = document.getElementById('errorMsg');
    const loginBtn = document.getElementById('loginBtn');

    if (localStorage.getItem('token')) {
      window.location.href = 'index.html';
    }

    form.addEventListener('submit', async function (e) {
      e.preventDefault();
      errorMsg.classList.remove('visible');
      loginBtn.disabled = true;
      loginBtn.textContent = 'Signing in...';

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        const res = await fetch(`${API_BASE}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.message || 'Login failed');

        localStorage.setItem('token', data.token);
        window.location.href = 'index.html';

      } catch (err) {
        errorMsg.textContent = err.message;
        errorMsg.classList.add('visible');
        loginBtn.disabled = false;
        loginBtn.textContent = 'Login';
      }
    });
  </script>

</body>
</html>
