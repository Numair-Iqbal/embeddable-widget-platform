<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Business Website (Fake Customer Site)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root{
      --ink:#2E2E2E;
      --slate:#6B6B6B;
      --bg:#EDEDED;
      --card:#F4F4F4;
      --line:rgba(46,46,46,0.16);
    }
    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:48px 24px;
      background:var(--bg);
      font-family:'IBM Plex Sans', sans-serif;
      color:var(--ink);
    }

    .frame{
      width:100%;
      max-width:1100px;
      min-height:560px;
      background:var(--card);
      border-radius:6px;
      box-shadow:0 50px 90px -40px rgba(20,20,20,0.35);
      position:relative;
      overflow:hidden;
      display:flex;
      flex-direction:column;
    }

    /* ---- background wave line art ---- */
    .frame svg.waves{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      z-index:0;
    }

    /* ---- top bar ---- */
    .topbar{
      position:relative;
      z-index:2;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:36px 56px 0;
    }
    .logo{
      font-family:'Poppins', sans-serif;
      font-weight:600;
      font-size:1.15rem;
      letter-spacing:0.06em;
      color:var(--ink);
    }
    nav{
      display:flex;
      gap:38px;
    }
    nav a{
      font-size:0.82rem;
      letter-spacing:0.04em;
      text-transform:uppercase;
      color:var(--slate);
      text-decoration:none;
      font-weight:500;
    }
    nav a:hover{ color:var(--ink); }
    .menu-icon{
      display:flex;
      flex-direction:column;
      gap:5px;
    }
    .menu-icon span{
      width:26px; height:3px;
      background:var(--ink);
      border-radius:2px;
    }

    /* ---- hero copy ---- */
    .hero{
      position:relative;
      z-index:2;
      flex:1;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:40px 32px 90px;
    }
    h1{
      font-family:'Poppins', sans-serif;
      font-weight:700;
      font-size:clamp(2.2rem, 5.2vw, 3.4rem);
      line-height:1.15;
      margin:0 0 22px;
      max-width:14ch;
      color:var(--ink);
    }
    p{
      font-size:1rem;
      line-height:1.75;
      color:var(--slate);
      max-width:46ch;
      margin:0;
    }

    @media (max-width: 760px){
      .topbar{ padding:28px 24px 0; }
      nav{ display:none; }
      .hero{ padding:32px 24px 70px; }
    }
  </style>
</head>
<body>

  <div class="frame">

    <svg class="waves" viewBox="0 0 1100 560" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <g fill="none" stroke="#B9B9B9" stroke-width="1" opacity="0.55">
        <path d="M -50 470 C 150 380, 300 560, 500 460 S 850 340, 1150 480" />
        <path d="M -50 500 C 150 410, 300 590, 500 490 S 850 370, 1150 510" />
        <path d="M -50 530 C 150 440, 300 620, 500 520 S 850 400, 1150 540" />
        <circle cx="140" cy="470" r="120" />
        <circle cx="140" cy="470" r="150" />
        <circle cx="960" cy="430" r="140" />
        <circle cx="960" cy="430" r="175" />
      </g>
      <g fill="none" stroke="#C9C9C9" stroke-width="1" opacity="0.4">
        <path d="M -50 500 C 200 420, 350 600, 550 500 S 900 380, 1150 520" />
      </g>
    </svg>

    <div class="topbar">
      <div class="logo">LOGO HERE</div>
      
   
      <div class="menu-icon"><span></span><span></span><span></span></div>
    </div>

    <div class="hero">
      <h1>Welcome to My Business Website</h1>
      <p>This is a normal page — the widget below is embedded from a different server.</p>
    </div>

  </div>

  <!-- This is the one-line embed snippet -->
  <script src="http://localhost:3000/widget.js" data-widget-id="2"></script>

</body>
</html>
